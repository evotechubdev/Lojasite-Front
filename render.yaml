services:
  - type: web
    name: lojasite-front
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://lojasite-back.onrender.com
      - key: VITE_BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
